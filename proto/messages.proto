syntax = "proto3";
package remote_work;

// Signaling messages sent over WebSocket between host/viewer and signaling server
message Envelope {
  oneof payload {
    RegisterHost register_host = 1;
    RegisterAck register_ack = 2;
    ConnectRequest connect_request = 3;
    ConnectResponse connect_response = 4;
    IncomingConnection incoming_connection = 5;
    SdpOffer sdp_offer = 6;
    SdpAnswer sdp_answer = 7;
    IceCandidate ice_candidate = 8;
    Error error = 9;
    Ping ping = 10;
    Pong pong = 11;
  }
}

message RegisterHost {
  string host_id = 1;
  string password_hash = 2;
}

message RegisterAck {
  string host_id = 1;
  bool success = 2;
}

message ConnectRequest {
  string target_host_id = 1;
  string password_hash = 2;
  string viewer_session_id = 3;
}

message ConnectResponse {
  bool accepted = 1;
  string session_token = 2;
  string error_message = 3;
}

message IncomingConnection {
  string viewer_session_id = 1;
}

message SdpOffer {
  string sdp = 1;
  string session_token = 2;
}

message SdpAnswer {
  string sdp = 1;
  string session_token = 2;
}

message IceCandidate {
  string candidate = 1;
  string sdp_mid = 2;
  int32 sdp_mline_index = 3;
  string session_token = 4;
}

message Error {
  string code = 1;
  string message = 2;
}

message Ping {
  uint64 timestamp_ms = 1;
}

message Pong {
  uint64 timestamp_ms = 1;
}
