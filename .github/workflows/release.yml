name: Release Host

# Build the customer-facing host .exe on Windows and attach it to a GitHub
# Release. `workflow_dispatch` lets us test the build without cutting a release;
# pushing a `v*` tag builds AND publishes.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  host-windows:
    name: host-agent (Windows .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-x64-windows-vpx-opus-openssl-v1

      - name: Install native libs (vcpkg)
        run: vcpkg install libvpx:x64-windows opus:x64-windows openssl:x64-windows

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: host-agent

      - name: Build host-agent (release)
        working-directory: host-agent
        env:
          VCPKG_ROOT: C:/vcpkg
          VCPKGRS_DYNAMIC: '1'
          LIBCLANG_PATH: C:/Program Files/LLVM/bin
          OPENSSL_DIR: C:/vcpkg/installed/x64-windows
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        run: cargo build --release

      - name: Rename artifact
        working-directory: host-agent
        run: Copy-Item target/release/host-agent.exe eremote-host.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: eremote-host-windows
          path: host-agent/eremote-host.exe

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: host-agent/eremote-host.exe
          fail_on_unmatched_files: true
