# coturn TURN server configuration for Remote Work
# Documentation: https://github.com/coturn/coturn/blob/master/README.turnserver

# Listening port
listening-port=3478

# TLS port (requires cert/key below)
# tls-listening-port=5349

# Public IP of the server (replace with actual public IP in production)
# external-ip=YOUR_PUBLIC_IP

# Realm (must match client configuration)
realm=remote-work.example.com

# Long-term credential mechanism
lt-cred-mech

# Static user (replace in production; generate with turnadmin)
user=remoteuser:remotepass

# Fingerprint on TURN messages
fingerprint

# Min/Max port range for relayed media
min-port=49152
max-port=65535

# Disable CLI
no-cli

# Log to stdout for Docker
log-file=stdout

# TLS certificate (uncomment and set paths for TURNS)
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# Verbose logging (disable in production)
# verbose
