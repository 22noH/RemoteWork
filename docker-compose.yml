version: '3.9'

services:
  signaling-server:
    build:
      context: .
      dockerfile: signaling-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=signaling_server=info
      - LISTEN_ADDR=0.0.0.0:8080
      # Uncomment for TLS (mount certs volume and set paths):
      # - TLS_CERT=/certs/fullchain.pem
      # - TLS_KEY=/certs/privkey.pem
    # volumes:
    #   - ./certs:/certs:ro
    restart: unless-stopped

  # coturn TURN server for NAT traversal relay
  coturn:
    image: coturn/coturn:latest
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"   # TLS
      - "5349:5349/tcp"
      - "49152-65535:49152-65535/udp"  # relay ports
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped
    command: ["-c", "/etc/coturn/turnserver.conf"]
