# coturn config for the optional `turn` profile.
# Replace YOURDOMAIN and the password to match deploy/.env, then start with:
#   docker compose --profile turn up -d
#
# coturn doesn't read environment variables, so these are edited by hand.

listening-port=3478
tls-listening-port=5349

# Long-term credentials. The host/viewer use TURN_USERNAME / TURN_CREDENTIAL
# matching user=<name>:<password> below.
lt-cred-mech
user=remotework:change-me-to-a-long-random-string
realm=YOURDOMAIN

# TLS — reuse the Let's Encrypt certificate (mounted at /etc/letsencrypt).
cert=/etc/letsencrypt/live/YOURDOMAIN/fullchain.pem
pkey=/etc/letsencrypt/live/YOURDOMAIN/privkey.pem

# UDP relay port range — must be open in the server firewall.
min-port=49152
max-port=65535

fingerprint
no-cli
no-tcp-relay

# If the server is behind NAT (its public IP differs from the local one),
# uncomment and set it:
# external-ip=YOUR_PUBLIC_IP
