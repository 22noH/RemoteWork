appId: com.remotedesktop.viewer
productName: RemoteDesktop
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: 22noH
  repo: RemoteWork
